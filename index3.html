        * {

        body {
            margin: 0;

        /* لایه روی بک‌گراند برای تنظیم روشنایی و تاریکی کلی سایت */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay);
            z-index: 1;
            transition: background 0.3s;
        }

        /* مطمئن شدن از قرارگیری محتوا بالای لایه بک‌گراند */
        .theme-toggle, .rsflogo, .content-wrapper, dialog {

            z-index: 2;

        /* دکمه سوییچ تم با آیکون */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--section-bg);
            border: 1px solid var(--border-neon);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10000;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--box-shadow);
            transition: background 0.3s, border-color 0.3s;
        }

        /* لوگوی اصلی بالای صفحه */
        .rsflogo {
            text-align: center;
            margin: 40px 0 20px 0;
            font-size: 3.5rem;
            font-weight: 900;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* باکس اصلی محتوا */
        .content-wrapper {
            width: 90%;
            max-width: 900px;
            background: var(--wrapper-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 0, 234, 0.1);
            backdrop-filter: blur(8px);
            margin-bottom: 40px;
            transition: background 0.3s, box-shadow 0.3s;
        }
